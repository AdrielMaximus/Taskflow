<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Tarefas</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1><i class="fas fa-tasks"></i> Gerenciador de Tarefas</h1>
      <p class="subtitle">Organize suas atividades do dia</p>
    </header>
    <form id="task-form" autocomplete="off">
      <div class="input-group">
        <input id="task-input" type="text" placeholder="✨ Adicionar nova tarefa..." required>
        <button id="add-btn" type="submit"><i class="fas fa-plus"></i> Adicionar</button>
      </div>
    </form>
    <div class="task-counter">
      <span id="task-count">0</span> tarefa(s)
    </div>
    <ul id="task-list"></ul>
    <div id="empty-state" class="empty-state">
      <i class="fas fa-inbox"></i>
      <p>Nenhuma tarefa por enquanto. Adicione uma para começar!</p>
    </div>
  </div>
    <script src="script.js"></script>
 
</body>
</html>
