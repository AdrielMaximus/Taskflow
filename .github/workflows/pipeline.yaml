name: CI/CD Pipeline - TaskFlow

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: back-end/package-lock.json

      - name: Install dependencies
        working-directory: ./back-end
        run: npm ci

      - name: Lint
        working-directory: ./back-end
        run: npm run lint || echo "Lint not configured yet"

      - name: Run Smoke Tests
        working-directory: ./back-end
        run: npm run test:smoke

      - name: Run Integration Tests
        working-directory: ./back-end
        run: npm run test:integration

      - name: Run Unit Test
        working-directory: ./back-end
        run: npm run test:unit || echo "No unit tests configured"

      - name: Build Docker images for scanning
        run: docker compose build

      - name: Trivy Scan Backend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: taskflow-back-end
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          scanners: vuln

  build-and-push:
    needs: tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./back-end
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-back-end:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-back-end:${{ github.sha }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./front-end
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-front-end:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-front-end:${{ github.sha }}