name: pipeline-code
on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: 'npm'
                  cache-dependency-path: back-end/package-lock.json
            - name: install dependencies
              working-directory: ./back-end
              run: npm ci
            - name: lint code
              working-directory: ./back-end
              run: npm run lint || echo "Lint not configured"
            - name: run test
              working-directory: ./back-end
              run: npm run test
            - name: Run Trivy scan
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  scan-type: fs
                  scan-ref: .
                  format: 'table'
                  exit-code: '1'
                  severity: 'CRITICAL,HIGH'

            - name: validate front-end
              working-directory: ./front-end
              run: |
                test -f index.html
                test -f script.js
                test -f style.css
    build:
        needs: tests
        runs-on: ubuntu-latest
        if: github.event_name == 'push'
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Docker Buildx 
              uses: docker/setup-buildx-action@v3 
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            - name: Build containers 
              run: docker compose build --parallel
            - name: Scan backend image 
              uses: aquasecurity/trivy-action@v0.36.0
              with: 
                image-ref: taskflow-back-end 
                format: table 
                exit-code: 1 
                severity: CRITICAL,HIGH 
            - name: Scan frontend image 
              uses: aquasecurity/trivy-action@v0.36.0
              with: 
                image-ref: taskflow-front-end 
                format: table 
                exit-code: 1 
                severity: CRITICAL,HIGH 

    
    deploy:
        needs: build
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: login to docker hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            - name: push backend image
              uses: docker/build-push-action@v6
              with:
                context: ./back-end
                file: ./back-end/Dockerfile
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/taskflow-back-end:latest

            - name: push frontend image
              uses: docker/build-push-action@v6
              with:
                context: ./front-end
                file: ./front-end/Dockerfile
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/taskflow-front-end:latest

    